# CodeQL — GitHub's static-analysis security scanner for Python.
# Mirrors the practice that GitHub Security Lab applies to libadb-android.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"  # 04:30 UTC every Monday
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:python
