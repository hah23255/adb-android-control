# Nightly deep-fuzzing — runs Hypothesis property tests at
# max_examples=1000 (vs the PR-default ~200). Catches counterexamples
# the shallow profile would miss.

name: Property tests (deep)

on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  property-deep:
    name: Hypothesis (deep, max_examples=1000)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Property tests (deep profile)
        run: |
          pytest -m property \
            --hypothesis-profile=ci \
            --hypothesis-show-statistics \
            -v
      - name: Upload Hypothesis database
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hypothesis-counterexamples
          path: .hypothesis/
          retention-days: 30
