<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="adb-android-control social preview">
  <title>adb-android-control — Comprehensive Android device control via ADB</title>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#83c5be"/>
      <stop offset="100%" stop-color="#a8dadc"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#415a77" stroke-width="1" stroke-opacity="0.15">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Accent stripe -->
  <rect x="0" y="0" width="8" height="640" fill="url(#accent)"/>

  <!-- Wordmark -->
  <text x="80" y="220" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Consolas, monospace"
        font-size="84" fill="#e0fbfc" font-weight="700" letter-spacing="-2">
    adb-android-control
  </text>

  <!-- Tagline -->
  <text x="80" y="290" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="32" fill="#a8dadc" font-weight="400">
    Comprehensive Android device control via ADB
  </text>
  <text x="80" y="328" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" fill="#778da9" font-style="italic">
    for humans, agents, and CI
  </text>

  <!-- Stats row -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <!-- 273 tests -->
    <g transform="translate(80,400)">
      <text font-size="56" fill="#83c5be" font-weight="700">273</text>
      <text x="0" y="32" font-size="18" fill="#778da9">tests</text>
    </g>
    <!-- 1.76:1 ratio -->
    <g transform="translate(280,400)">
      <text font-size="56" fill="#83c5be" font-weight="700">1.76:1</text>
      <text x="0" y="32" font-size="18" fill="#778da9">test/code ratio</text>
    </g>
    <!-- 9 modules -->
    <g transform="translate(580,400)">
      <text font-size="56" fill="#83c5be" font-weight="700">9</text>
      <text x="0" y="32" font-size="18" fill="#778da9">modules, fully typed</text>
    </g>
    <!-- 0 PII -->
    <g transform="translate(820,400)">
      <text font-size="56" fill="#e63946" font-weight="700">0</text>
      <text x="0" y="32" font-size="18" fill="#778da9">PII in repo (post-Lesson-48)</text>
    </g>
  </g>

  <!-- Bottom badges -->
  <g transform="translate(80,520)" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Consolas, monospace" font-size="20">
    <text fill="#778da9">Master Tester Doctrine</text>
    <text x="280" fill="#778da9">·</text>
    <text x="300" fill="#778da9">mypy --strict</text>
    <text x="500" fill="#778da9">·</text>
    <text x="520" fill="#778da9">MIT</text>
    <text x="600" fill="#778da9">·</text>
    <text x="620" fill="#778da9">Python 3.10+</text>
  </g>

  <!-- GitHub URL -->
  <text x="1200" y="600" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Consolas, monospace"
        font-size="18" fill="#415a77">
    github.com/hah23255/adb-android-control
  </text>
</svg>
