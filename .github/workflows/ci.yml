# Master CI — lint + typecheck + test matrix + coverage
#
# Doctrine alignment:
#   Law 1 — `test-file-integrity` job blocks PRs that modify
#           tests/**/*.py vs the base ref (the "fix the code, not
#           the test" gate).
#   Law 5 — pytest-randomly randomizes test order each run.
#   Law 6 — `gitleaks` job re-prevents the v1.0.0 PII incident class.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Doctrine Law 1 enforcement ─────────────────────────────────────────
  test-file-integrity:
    name: Law 1 — no test edits to fix CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check tests/ unchanged vs base
        run: |
          MODIFIED=$(git diff --name-only \
            "origin/${{ github.base_ref }}...HEAD" \
            | grep -E '^tests/.*\.py$' || true)
          if [ -n "$MODIFIED" ]; then
            echo "❌ BLOCKED — Doctrine Law 1: tests must not be modified to make CI green."
            echo "Modified test files:"
            echo "$MODIFIED"
            echo ""
            echo "If the test is genuinely wrong, open a separate PR with"
            echo "reviewer sign-off explaining WHY — never combine with a"
            echo "make-CI-green change."
            exit 1
          fi
          echo "✅ No test files modified."

  # ── Secret / PII scan (re-prevent internal lesson (PII pre-commit gate)) ───────────────────────────
  gitleaks:
    name: gitleaks (PII scan — internal lesson (PII pre-commit gate))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint (ruff) ────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  # ── Type checking (mypy --strict) ──────────────────────────────────────
  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mypy
        run: mypy adb_android_control

  # ── Test matrix ────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest \
            -m "unit or property or race" \
            --cov \
            --cov-report=xml \
            --cov-report=term \
            --tb=short
        env:
          # Hypothesis on PR CI uses shallow profile by default;
          # nightly job below runs the deep profile.
          HYPOTHESIS_PROFILE: default
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v7
        with:
          file: coverage.xml
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Build sanity ───────────────────────────────────────────────────────
  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify wheel imports cleanly
        run: |
          pip install dist/*.whl
          python -c "import adb_android_control; print(adb_android_control.__version__)"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
